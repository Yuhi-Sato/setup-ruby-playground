name: Cache Consumer (ubuntu-slim)

on:
  workflow_dispatch:

jobs:
  consume-cache:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Install MariaDB client library
        run: |
          sudo apt-get update
          sudo apt-get install -y libmariadb-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Debug - show available libraries
        run: |
          echo "=== OS info ==="
          cat /etc/os-release
          echo ""
          echo "=== mysql/mariadb related libraries ==="
          ldconfig -p | grep -E "mysql|mariadb" || true
          echo ""
          echo "=== mysql2.so location ==="
          find $BUNDLE_PATH -name "mysql2.so" 2>/dev/null || find $(bundle show mysql2) -name "mysql2.so" 2>/dev/null
          echo ""
          echo "=== ldd output ==="
          ldd $(find $BUNDLE_PATH -name "mysql2.so" 2>/dev/null || find $(bundle show mysql2) -name "mysql2.so" 2>/dev/null) || true

      - name: Try to load mysql2 (expect failure)
        run: bundle exec ruby -e "require 'mysql2'; puts 'mysql2 loaded successfully'"
