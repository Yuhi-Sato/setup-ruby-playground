name: Verify without stale cache

on:
  workflow_dispatch:

jobs:
  fresh-build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libmariadb-dev
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler: '4.0.0'
          bundler-cache: true
      - run: ruby -e "require 'bundler'; Bundler.require"
