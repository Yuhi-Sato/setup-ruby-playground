name: Cache Creator (ubuntu-latest)

on:
  workflow_dispatch:

jobs:
  create-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MySQL client library
        run: |
          sudo apt-get update
          sudo apt-get install -y libmysqlclient-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Debug - show mysql2.so linked libraries
        run: |
          echo "=== mysql2.so location ==="
          find $BUNDLE_PATH -name "mysql2.so" -o -name "mysql2.bundle" 2>/dev/null || find $(bundle show mysql2) -name "mysql2.so" 2>/dev/null
          echo ""
          echo "=== ldd output ==="
          ldd $(find $BUNDLE_PATH -name "mysql2.so" 2>/dev/null || find $(bundle show mysql2) -name "mysql2.so" 2>/dev/null) || true
          echo ""
          echo "=== OS info ==="
          cat /etc/os-release
          echo ""
          echo "=== libmysqlclient location ==="
          ldconfig -p | grep mysql || true

      - name: Verify mysql2 loads correctly
        run: bundle exec ruby -e "require 'mysql2'; puts 'mysql2 loaded successfully'"
